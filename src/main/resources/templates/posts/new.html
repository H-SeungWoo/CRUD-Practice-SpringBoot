<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>게시글 작성</title>
</head>
<body>

<h1>게시글 작성</h1>

<form action="/posts" method="post">
    <div>
        <label>제목</label>
        <input type="text" name="title">
    </div>

    <div>
        <label>내용</label>
        <textarea name="content"></textarea>
    </div>

    <button type="submit">저장</button>
</form>

<a href="/posts">목록으로 이동</a>

</body>
</html>
